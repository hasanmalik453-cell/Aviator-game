<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aviator Demo</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<header>

<h1>✈ AVIATOR</h1>

<div class="balance">
Balance:
<span id="balance">$10000</span>
</div>

</header>

<div class="game">

<canvas id="graph"></canvas>

<div id="multiplier">1.00x</div>

<div id="status">
Waiting...
</div>

</div>

<div class="controls">

<input
type="number"
id="bet"
value="100"
min="10"
>

<button id="betBtn">
BET
</button>

<button id="cashBtn">
CASH OUT
</button>

</div>

<div class="history">

<h3>History</h3>

<div id="history"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
