
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Demo Game</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>✈️ AVIATOR DEMO</h1>

    <div class="game-area">

        <div id="multiplier">1.00x</div>

        <div class="plane">
            ✈️
        </div>

    </div>

    <div class="controls">

        <input type="number" id="betAmount" value="100" min="10">

        <button id="betBtn">
            Place Bet
        </button>

        <button id="cashBtn" disabled>
            Cash Out
        </button>

    </div>

    <div class="history">

        <h3>Previous Crashes</h3>

        <div id="historyList">
            --
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
